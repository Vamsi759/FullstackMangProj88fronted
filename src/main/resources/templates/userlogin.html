<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* CARD */
        .login-box {
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 15px;

            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);

            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            color: white;
        }

        h3 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
        }

        /* INPUT */
        .form-control {
            border-radius: 8px;
            border: none;
            padding: 12px;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .form-control:focus {
            box-shadow: 0 0 8px rgba(255,255,255,0.7);
            transform: scale(1.02);
        }

        /* BUTTON */
        .btn-custom {
            background: white;
            color: #764ba2;
            font-weight: 600;
            border-radius: 8px;
            padding: 10px;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background: #f1f1f1;
            transform: scale(1.05);
        }

        /* EXTRA LINKS */
        .extra-link {
            display: block;
            text-align: center;
            margin-top: 10px;
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        .extra-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h3>🔐 User Login</h3>

    <form th:action="@{/ins/userloginrecord}" method="post">

        <input type="email" name="email" class="form-control" 
               placeholder="Enter Email" required>

        <input type="password" name="password" class="form-control" 
               placeholder="Enter Password" required>

        <button type="submit" class="btn btn-custom w-100">
            Login
        </button>

    </form>

    <a th:href="@{/ins/openusersignup}" class="extra-link">
        Create New Account?
    </a>
</div>

</body>
</html>
