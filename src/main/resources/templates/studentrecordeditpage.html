<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Edit Student</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* CARD */
        .form-box {
            width: 100%;
            max-width: 420px;
            padding: 30px;
            border-radius: 15px;

            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);

            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            color: white;
        }

        h3 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
        }

        /* LABEL */
        .form-label {
            font-size: 14px;
            margin-bottom: 5px;
        }

        /* INPUT */
        .form-control {
            border-radius: 8px;
            border: none;
            padding: 12px;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .form-control:focus {
            box-shadow: 0 0 8px rgba(255,255,255,0.7);
            transform: scale(1.02);
        }

        /* BUTTON */
        .btn-custom {
            background: white;
            color: #ff6a88;
            font-weight: 600;
            border-radius: 8px;
            padding: 10px;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background: #f1f1f1;
            transform: scale(1.05);
        }

        /* BACK LINK */
        .back-link {
            display: block;
            text-align: center;
            margin-top: 10px;
            color: white;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="form-box">
    <h3>✏️ Edit Student</h3>

    <form th:action="@{/ins/editstudentrecord/{id}(id=${student.id})}" method="post">

        <label class="form-label">Student Name</label>
        <input type="text" name="name" class="form-control"
               th:value="${student.name}" required>

        <label class="form-label">Qualification</label>
        <input type="text" name="qualification" class="form-control"
               th:value="${student.qualification}" required>

        <label class="form-label">Course</label>
        <input type="text" name="course" class="form-control"
               th:value="${student.course}" required>

        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control"
               th:value="${student.email}" required>

        <button type="submit" class="btn btn-custom w-100 mt-2">
            Update Student
        </button>

    </form>

    <a th:href="@{/ins}" class="back-link">⬅ Back to List</a>
</div>

</body>
</html>
